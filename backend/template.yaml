AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: API backend for my_agent1 runtime

Globals:
  Function:
    Runtime: python3.12
    Timeout: 120
    MemorySize: 256

Parameters:
  AwsRegion:
    Type: String
    Default: us-east-1
    Description: AWS region used by runtime and diagnostics clients
  AgentRuntimeUrl:
    Type: String
    Description: HTTPS invoke URL for AgentCore runtime endpoint
  AgentcoreRuntimeId:
    Type: String
    Default: my_agent1-EuvQcG3t0u
    Description: AgentCore runtime ID
  RuntimeLogGroup:
    Type: String
    Default: /aws/bedrock-agentcore/runtimes/my_agent1-EuvQcG3t0u-DEFAULT
    Description: Runtime CloudWatch log group
  RuntimeLogStream:
    Type: String
    Default: agent-traces
    Description: Runtime fixed log stream name
  OTelRuntimeLogStream:
    Type: String
    Default: otel-rt-logs
    Description: Runtime OTEL log stream name
  EvaluatorLogGroup:
    Type: String
    Default: ""
    Description: Evaluator CloudWatch log group
  EvaluatorLogPrefix:
    Type: String
    Default: /aws/bedrock-agentcore/evaluations
    Description: Prefix for evaluator log groups discovery
  DiagnosisModelId:
    Type: String
    Default: arn:aws:bedrock:us-east-1:636052469006:inference-profile/global.anthropic.claude-sonnet-4-6
    Description: Bedrock model ID or ARN for diagnostics synthesis
  RuntimeServiceName:
    Type: String
    Default: my_agent1.DEFAULT
    Description: Runtime service name used to filter wrapper steps in traces
  DelayThresholdMs:
    Type: String
    Default: "6000"
    Description: Delay threshold in milliseconds
  OverallLookbackHours:
    Type: String
    Default: "87600"
    Description: Lookback hours for overall timeframe mode
  MaxAnalysisLookbackHours:
    Type: String
    Default: "2160"
    Description: Safety cap for analysis lookback to avoid Lambda timeout
  XrayMaxLookbackHours:
    Type: String
    Default: "720"
    Description: X-Ray data retention cap (30 days); never query X-Ray beyond this to avoid empty API calls
  XrayQueryChunkHours:
    Type: String
    Default: "24"
    Description: Hours per X-Ray GetTraceSummaries call (API max is 24h)
  FleetRuntimeLimit:
    Type: String
    Default: "1800"
  FleetEvaluatorMaxGroups:
    Type: String
    Default: "10"
  FleetEvaluatorPerGroupLimit:
    Type: String
    Default: "300"
  FleetXrayMaxTraces:
    Type: String
    Default: "600"
  FleetFastRuntimeLimit:
    Type: String
    Default: "300"
  FleetFastEvaluatorMaxGroups:
    Type: String
    Default: "2"
  FleetFastEvaluatorPerGroupLimit:
    Type: String
    Default: "60"
  FleetFastEvaluatorBudgetSeconds:
    Type: String
    Default: "2.0"
  FleetFastRuntimeBudgetSeconds:
    Type: String
    Default: "3.0"
  FleetFastRuntimeMaxCandidateStreams:
    Type: String
    Default: "1200"
  FleetFastXrayMaxTraces:
    Type: String
    Default: "40"
  FleetFastXrayBudgetSeconds:
    Type: String
    Default: "1.5"
  FleetFastXrayMaxSegments:
    Type: String
    Default: "1"
  FleetFastXrayMaxPagesPerSegment:
    Type: String
    Default: "1"
  CognitoIssuer:
    Type: String
    Default: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_l6dPnsMxY
    Description: Cognito issuer URL for JWT validation
  CognitoAudience:
    Type: String
    Default: 4hb4q7nat1kqbm6ehsgtq3e2op
    Description: Cognito app client ID audience value

Resources:
  ChatApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowOrigins:
          - '*'
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            JwtConfiguration:
              issuer: !Ref CognitoIssuer
              audience:
                - !Ref CognitoAudience
            IdentitySource: "$request.header.Authorization"

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: chat_endpoint.handler
      CodeUri: lambda/
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:Invoke*
                - bedrock-agentcore-runtime:Invoke*
              Resource: '*'
            - Effect: Allow
              Action:
                - logs:FilterLogEvents
                - logs:GetLogEvents
                - logs:DescribeLogGroups
                - logs:DescribeLogStreams
              Resource: '*'
            - Effect: Allow
              Action:
                - xray:BatchGetTraces
                - xray:GetTraceSummaries
              Resource: '*'
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Environment:
        Variables:
          AGENTCORE_RUNTIME_URL: !Ref AgentRuntimeUrl
          AGENTCORE_RUNTIME_ID: !Ref AgentcoreRuntimeId
          RUNTIME_LOG_GROUP: !Ref RuntimeLogGroup
          RUNTIME_LOG_STREAM: !Ref RuntimeLogStream
          OTEL_RUNTIME_LOG_STREAM: !Ref OTelRuntimeLogStream
          EVALUATOR_LOG_GROUP: !Ref EvaluatorLogGroup
          EVALUATOR_LOG_PREFIX: !Ref EvaluatorLogPrefix
          DIAGNOSIS_MODEL_ID: !Ref DiagnosisModelId
          RUNTIME_SERVICE_NAME: !Ref RuntimeServiceName
          DELAY_THRESHOLD_MS: !Ref DelayThresholdMs
          OVERALL_LOOKBACK_HOURS: !Ref OverallLookbackHours
          MAX_ANALYSIS_LOOKBACK_HOURS: !Ref MaxAnalysisLookbackHours
          XRAY_MAX_LOOKBACK_HOURS: !Ref XrayMaxLookbackHours
          XRAY_QUERY_CHUNK_HOURS: !Ref XrayQueryChunkHours
          FLEET_RUNTIME_LIMIT: !Ref FleetRuntimeLimit
          FLEET_EVALUATOR_MAX_GROUPS: !Ref FleetEvaluatorMaxGroups
          FLEET_EVALUATOR_PER_GROUP_LIMIT: !Ref FleetEvaluatorPerGroupLimit
          FLEET_XRAY_MAX_TRACES: !Ref FleetXrayMaxTraces
          FLEET_FAST_RUNTIME_LIMIT: !Ref FleetFastRuntimeLimit
          FLEET_FAST_RUNTIME_BUDGET_SECONDS: !Ref FleetFastRuntimeBudgetSeconds
          FLEET_FAST_RUNTIME_MAX_CANDIDATE_STREAMS: !Ref FleetFastRuntimeMaxCandidateStreams
          FLEET_FAST_EVALUATOR_MAX_GROUPS: !Ref FleetFastEvaluatorMaxGroups
          FLEET_FAST_EVALUATOR_PER_GROUP_LIMIT: !Ref FleetFastEvaluatorPerGroupLimit
          FLEET_FAST_EVALUATOR_BUDGET_SECONDS: !Ref FleetFastEvaluatorBudgetSeconds
          FLEET_FAST_XRAY_MAX_TRACES: !Ref FleetFastXrayMaxTraces
          FLEET_FAST_XRAY_BUDGET_SECONDS: !Ref FleetFastXrayBudgetSeconds
          FLEET_FAST_XRAY_MAX_SEGMENTS: !Ref FleetFastXrayMaxSegments
          FLEET_FAST_XRAY_MAX_PAGES_PER_SEGMENT: !Ref FleetFastXrayMaxPagesPerSegment
      Events:
        ChatPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChatApi
            Path: /chat
            Method: POST

  SessionInsightsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: analysis_endpoint.handler
      CodeUri: lambda/
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:Invoke*
                - bedrock-agentcore-runtime:Invoke*
              Resource: '*'
            - Effect: Allow
              Action:
                - logs:FilterLogEvents
                - logs:GetLogEvents
                - logs:DescribeLogGroups
                - logs:DescribeLogStreams
              Resource: '*'
            - Effect: Allow
              Action:
                - xray:BatchGetTraces
                - xray:GetTraceSummaries
              Resource: '*'
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
      Environment:
        Variables:
          AGENTCORE_RUNTIME_URL: !Ref AgentRuntimeUrl
          AGENTCORE_RUNTIME_ID: !Ref AgentcoreRuntimeId
          RUNTIME_LOG_GROUP: !Ref RuntimeLogGroup
          RUNTIME_LOG_STREAM: !Ref RuntimeLogStream
          OTEL_RUNTIME_LOG_STREAM: !Ref OTelRuntimeLogStream
          EVALUATOR_LOG_GROUP: !Ref EvaluatorLogGroup
          EVALUATOR_LOG_PREFIX: !Ref EvaluatorLogPrefix
          DIAGNOSIS_MODEL_ID: !Ref DiagnosisModelId
          RUNTIME_SERVICE_NAME: !Ref RuntimeServiceName
          DELAY_THRESHOLD_MS: !Ref DelayThresholdMs
          OVERALL_LOOKBACK_HOURS: !Ref OverallLookbackHours
          MAX_ANALYSIS_LOOKBACK_HOURS: !Ref MaxAnalysisLookbackHours
          XRAY_MAX_LOOKBACK_HOURS: !Ref XrayMaxLookbackHours
          XRAY_QUERY_CHUNK_HOURS: !Ref XrayQueryChunkHours
          FLEET_RUNTIME_LIMIT: !Ref FleetRuntimeLimit
          FLEET_EVALUATOR_MAX_GROUPS: !Ref FleetEvaluatorMaxGroups
          FLEET_EVALUATOR_PER_GROUP_LIMIT: !Ref FleetEvaluatorPerGroupLimit
          FLEET_XRAY_MAX_TRACES: !Ref FleetXrayMaxTraces
          FLEET_FAST_RUNTIME_LIMIT: !Ref FleetFastRuntimeLimit
          FLEET_FAST_RUNTIME_BUDGET_SECONDS: !Ref FleetFastRuntimeBudgetSeconds
          FLEET_FAST_RUNTIME_MAX_CANDIDATE_STREAMS: !Ref FleetFastRuntimeMaxCandidateStreams
          FLEET_FAST_EVALUATOR_MAX_GROUPS: !Ref FleetFastEvaluatorMaxGroups
          FLEET_FAST_EVALUATOR_PER_GROUP_LIMIT: !Ref FleetFastEvaluatorPerGroupLimit
          FLEET_FAST_EVALUATOR_BUDGET_SECONDS: !Ref FleetFastEvaluatorBudgetSeconds
          FLEET_FAST_XRAY_MAX_TRACES: !Ref FleetFastXrayMaxTraces
          FLEET_FAST_XRAY_BUDGET_SECONDS: !Ref FleetFastXrayBudgetSeconds
          FLEET_FAST_XRAY_MAX_SEGMENTS: !Ref FleetFastXrayMaxSegments
          FLEET_FAST_XRAY_MAX_PAGES_PER_SEGMENT: !Ref FleetFastXrayMaxPagesPerSegment
      Events:
        SessionInsightsPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChatApi
            Path: /session-insights
            Method: POST

Outputs:
  ApiUrl:
    Description: HTTP API base URL
    Value: !Sub "https://${ChatApi}.execute-api.${AWS::Region}.amazonaws.com"
